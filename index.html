<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторы</title>
    <!-- Подключение автономного сканера штрих-кодов -->
    <script src="https://unpkg.com">
    let dbData = JSON.parse(localStorage.getItem('monitors_archive')) || [];
    let tempSN = '';
    let tempPhoto = '';
    let scannerObj = null;
    let cameraStream = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- ЛОГИКА ДОБАВЛЕНИЯ МОНИТОРА ---
    
    // Нажатие на кнопка ПЛЮС -> Запуск сканера штрих-кодов
    document.getElementById('btn-add').addEventListener('click', () => {
        tempSN = ''; tempPhoto = '';
        showScreen('scr-scanner');
        scannerObj = new Html5Qrcode("scanner-view");
        scannerObj.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (text) => {
                tempSN = text;
                scannerObj.stop().then(() => { scannerObj = null; openCam(); });
            },
            () => {}
        ).catch(() => {
            tempSN = prompt("Сканер недоступен. Введите серийный номер:") || "—";
            openCam();
        });
    });

    // Шаг 2: Включение камеры для фото модели
    async function openCam() {
        showScreen('scr-camera');
        const video = document.getElementById('webcam');
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = cameraStream;
        } catch {
            alert("Камера недоступна");
            openCard();
        }
    }

    // Кнопка Сделать фото
    document.getElementById('btn-shoot').addEventListener('click', () => {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photo-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        tempPhoto = canvas.toDataURL('image/jpeg', 0.6);
        
        if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); }
        openCard();
    });

    // Шаг 3: Открытие карточки параметров
    function openCard() {
        showScreen('scr-card');
        document.getElementById('view-photo').src = tempPhoto || '';
        document.getElementById('out-sn').value = tempSN;
        document.getElementById('out-brand').value = '';
        document.getElementById('out-model').value = '';
    }

    // Кнопка возвращения в главное меню (сохраняет данные)
    document.getElementById('btn-to-main').addEventListener('click', () => {
        const item = {
            id: Date.now(),
            brand: document.getElementById('out-brand').value || '—',
            model: document.getElementById('out-model').value || '—',
            sn: document.getElementById('out-sn').value || '—',
            photo: tempPhoto
        };
        dbData.push(item);
        localStorage.setItem('monitors_archive', JSON.stringify(dbData));
        showScreen('scr-main');
    });

    // --- ЛОГИКА БАЗЫ ДАННЫХ ---

    document.getElementById('btn-db').addEventListener('click', () => {
        buildDbViews();
        showScreen('scr-db');
        document.getElementById('db-cards-container').classList.add('active');
        document.getElementById('db-table-container').classList.remove('active');
        document.getElementById('btn-format-table').textContent = 'Форматировать в таблицу';
    });

    document.getElementById('btn-db-back').addEventListener('click', () => {
        showScreen('scr-main');
    });

    function buildDbViews() {
        const cardsWrap = document.getElementById('db-cards-container');
        const tableBody = document.querySelector('#word-table tbody');
        cardsWrap.innerHTML = '';
        tableBody.innerHTML = '';

        dbData.forEach(item => {
            // Отрисовка списка карточек
            const div = document.createElement('div');
            div.className = 'db-item';
            div.innerHTML = `
                <h4>${item.brand} ${item.model}</h4>
                <p><b>S/N:</b> ${item.sn}</p>
                <button class="btn-del" onclick="removeSingle(${item.id})">❌</button>
            `;
            cardsWrap.appendChild(div);

            // Отрисовка таблицы (Модель, SN, Производитель)
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.model}</td><td>${item.sn}</td><td>${item.brand}</td>`;
            tableBody.appendChild(tr);
        });
    }

    // Переключение режимов (Карточки / Таблица)
    document.getElementById('btn-format-table').addEventListener('click', function() {
        const cView = document.getElementById('db-cards-container');
        const tView = document.getElementById('db-table-container');
        if (cView.classList.contains('active')) {
            cView.classList.remove('active');
            tView.classList.add('active');
            this.textContent = 'Показать карточки';
        } else {
            tView.classList.remove('active');
            cView.classList.add('active');
            this.textContent = 'Форматировать в таблицу';
        }
    });

    // Удаление отдельной карточки
    window.removeSingle = function(id) {
        if(confirm('Удалить эту карточку?')) {
            dbData = dbData.filter(i => i.id !== id);
            localStorage.setItem('monitors_archive', JSON.stringify(dbData));
            buildDbViews();
        }
    };

    // Очистить всю базу
    document.getElementById('btn-clear-all').addEventListener('click', () => {
        if(confirm('Полностью очистить базу данных?')) {
            dbData = [];
            localStorage.setItem('monitors_archive', JSON.stringify(dbData));
            buildDbViews();
        }
    });
</script>
<style>
    :root {
        --tg-bg: #182533;
        --tg-panel: #202b36;
        --tg-text: #f5f5f5;
        --tg-muted: #7f91a4;
        --tg-button: #2f8ccd;
        --tg-button-hover: #3b9cd9;
        --tg-danger: #ec3942;
        --tg-border: #2f3e4e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--tg-bg); color: var(--tg-text); display: flex; justify-content: center; padding: 20px; }

    .screen { display: none; width: 100%; max-width: 450px; background: var(--tg-panel); border-radius: 10px; overflow: hidden; }
    .screen.active { display: block; }

    /* Главное меню */
    .main-layout { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
    #btn-add { font-size: 32px; height: 80px; }

    /* Кнопки */
    button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; color: #fff; font-weight: 500; }
    .btn-tg-primary { background: var(--tg-button); }
    .btn-tg-primary:hover { background: var(--tg-button-hover); }
    .btn-tg-secondary { background: #2b394a; border: 1px solid var(--tg-border); }
    .btn-tg-secondary:hover { background: #35465b; }
    .btn-danger { background: var(--tg-danger); }
    .btn-text { background: transparent; width: auto; color: var(--tg-button); }

    /* Сканер и Камера */
    #scanner-view { width: 100%; aspect-ratio: 4/3; background: #000; }
    #webcam { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #000; }
    #btn-shoot { margin: 15px; width: calc(100% - 30px); }

    /* Карточка */
    .card-content { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .img-wrap { width: 100%; max-height: 180px; background: #000; display: flex; justify-content: center; border-radius: 6px; overflow: hidden; }
    .img-wrap img { max-width: 100%; max-height: 180px; object-fit: contain; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { color: var(--tg-muted); font-size: 13px; }
    .field input { background: #24313f; border: 1px solid var(--tg-border); border-radius: 6px; padding: 10px; color: #fff; font-size: 15px; outline: none; }
    .field input:focus { border-color: var(--tg-button); }

    /* База данных */
    .db-header { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--tg-border); background: #17212b; }
    .db-header button { padding: 8px 12px; font-size: 13px; }
    .db-view { display: none; padding: 15px; max-height: 75vh; overflow-y: auto; }
    .db-view.active { display: block; }

    /* Элемент списка в БД */
    .db-item { background: #24313f; border: 1px solid var(--tg-border); border-radius: 8px; padding: 12px; margin-bottom: 10px; position: relative; }
    .db-item h4 { color: var(--tg-button); margin-bottom: 4px; }
    .db-item p { font-size: 14px; color: var(--tg-text); }
    .btn-del { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; padding: 0; background: transparent; color: var(--tg-muted); }
    .btn-del:hover { color: var(--tg-danger); }

    /* Таблица Word */
    table { width: 100%; border-collapse: collapse; background: #24313f; font-size: 14px; }
    th, td { border: 1px solid var(--tg-border); padding: 8px; text-align: left; }
    th { background: #17212b; color: var(--tg-button); }
</style>
</head>
<body>

    <!-- Главное меню (2 кнопки) -->
    <div id="scr-main" class="screen active">
        <div class="main-layout">
            <button id="btn-add" class="btn-tg-primary">＋</button>
            <button id="btn-db" class="btn-tg-secondary">База данных</button>
        </div>
    </div>

    <!-- Шаг 1: Сканер штрих-кодов -->
    <div id="scr-scanner" class="screen">
        <div id="scanner-view"></div>
    </div>

    <!-- Шаг 2: Камера для фото модели/производителя -->
    <div id="scr-camera" class="screen">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="photo-canvas" style="display:none;"></canvas>
        <button id="btn-shoot" class="btn-tg-primary">Сделать фото</button>
    </div>

    <!-- Шаг 3: Карточка параметров -->
    <div id="scr-card" class="screen">
        <div class="card-content">
            <div class="img-wrap"><img id="view-photo" src="" alt="Фото"></div>
            <div class="field"><label>Производитель</label><input type="text" id="out-brand"></div>
            <div class="field"><label>Модель</label><input type="text" id="out-model"></div>
            <div class="field"><label>Серийный номер</label><input type="text" id="out-sn"></div>
            <button id="btn-to-main" class="btn-tg-primary">Главное меню</button>
        </div>
    </div>

    <!-- Экран 4: База данных -->
    <div id="scr-db" class="screen">
        <div class="db-header">
            <button id="btn-db-back" class="btn-text">◀ Назад</button>
            <button id="btn-format-table" class="btn-tg-secondary">Форматировать в таблицу</button>
            <button id="btn-clear-all" class="btn-danger">Очистить базу</button>
        </div>

        <!-- Вид карточками -->
        <div id="db-cards-container" class="db-view active"></div>

        <!-- Вид таблицей для копирования в Word -->
        <div id="db-table-container" class="db-view">
            <table id="word-table">
                <thead>
                    <tr>
                        <th>Модель</th>
                        <th>Серийный номер</th>
                        <th>Производитель</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</body>
</html>
