<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор База</title>
    <!-- Подключение библиотеки для сканирования штрих-кодов -->
    <script src="https://unpkg.com">
<style>
    /* Палитра Telegram Dark */
    :root {
        --bg-color: #182533;
        --panel-bg: #202b36;
        --text-color: #f5f5f5;
        --text-muted: #7f91a4;
        --accent-color: #2f8ccd;
        --accent-hover: #3b9cd9;
        --danger-color: #ec3942;
        --danger-hover: #fa4c56;
        --border-color: #2f3e4e;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 15px;
    }

    /* Экраны */
    .screen {
        display: none;
        width: 100%;
        max-width: 500px;
        background-color: var(--panel-bg);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .screen.active {
        display: block;
    }

    .app-header {
        background-color: #17212b;
        padding: 16px;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Кнопки */
    button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        color: white;
    }

    .btn-primary { background-color: var(--accent-color); }
    .btn-primary:hover { background-color: var(--accent-hover); }
    
    .btn-secondary { background-color: #2b394a; border: 1px solid var(--border-color); }
    .btn-secondary:hover { background-color: #35465b; }

    .btn-danger { background-color: var(--danger-color); }
    .btn-danger:hover { background-color: var(--danger-hover); }

    .btn-back { width: auto; padding: 6px 12px; font-size: 14px; background: #2b394a; }

    .icon { margin-right: 8px; font-size: 18px; }

    /* Главное меню */
    .main-buttons {
        padding: 25px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Камера и Сканер */
    .scanner-container, .camera-container {
        width: 100%;
        background: #000;
        position: relative;
        aspect-ratio: 4/3;
        overflow: hidden;
    }
    
    video, #interactive {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #screen-scanner button, #screen-camera button {
        margin: 15px;
        width: calc(100% - 30px);
    }

    /* Форма карточки */
    .card-form { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    
    .photo-preview-container {
        width: 100%;
        max-height: 200px;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        display: flex;
        justify-content: center;
    }
    #photo-preview { max-width: 100%; max-height: 200px; object-fit: contain; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { color: var(--text-muted); font-size: 14px; }
    
    input, textarea {
        background-color: #24313f;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 10px;
        color: var(--text-color);
        font-size: 15px;
        outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent-color); }

    /* База данных */
    .db-actions { padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid var(--border-color); }
    .db-content { display: none; padding: 15px; max-height: 70vh; overflow-y: auto; }
    .db-content.active-view { display: block; }

    /* Карточки в БД */
    .monitor-item {
        background: #24313f;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        position: relative;
    }
    .monitor-item h4 { color: var(--accent-color); margin-bottom: 5px; }
    .monitor-item p { font-size: 14px; margin-bottom: 3px; color: var(--text-color); }
    .monitor-item span { color: var(--text-muted); }
    
    .btn-delete-item {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        padding: 0;
        background: transparent;
        color: var(--text-muted);
    }
    .btn-delete-item:hover { color: var(--danger-color); }

    /* Таблица */
    .table-instructions { color: var(--text-muted); font-size: 13px; margin-bottom: 10px; text-align: center; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #24313f; color: var(--text-color); font-size: 14px; }
    th, td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
    th { background: #17212b; color: var(--accent-color); }
</style>
<script>
    // Хранилище данных (использует локальную память браузера LocalStorage)
    let db = JSON.parse(localStorage.getItem('monitor_db')) || [];
    let currentScanResult = '';
    let currentPhotoData = '';
    let html5QrcodeScanner = null;
    let videoStream = null;

    // Переключение экранов
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // --- Кнопки главного меню ---
    document.getElementById('btn-add').addEventListener('click', () => {
        currentScanResult = '';
        currentPhotoData = '';
        startScanner();
    });

    document.getElementById('btn-db').addEventListener('click', () => {
        renderDatabase();
        switchScreen('screen-database');
    });

    document.getElementById('btn-back-main').addEventListener('click', () => {
        switchScreen('screen-main');
    });

    // --- Модуль 1: Сканер штрих-кодов ---
    function startScanner() {
        switchScreen('screen-scanner');
        html5QrcodeScanner = new Html5Qrcode("interactive");
        
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                currentScanResult = decodedText;
                stopScanner();
                startCamera(); // Переходим к камере
            },
            () => { /* Игнорируем ошибки сканирования в реальном времени */ }
        ).catch(err => {
            alert("Ошибка камеры: " + err);
            // Если камеры нет, симулируем для теста или даем ввести вручную
            currentScanResult = prompt("Не удалось открыть сканер. Введите серийный номер вручную:") || "БЕЗ_СН";
            startCamera();
        });
    }

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
            }).catch(err => console.log(err));
        }
    }

    document.getElementById('btn-cancel-scan').addEventListener('click', () => {
        stopScanner();
        switchScreen('screen-main');
    });

    // --- Модуль 2: Фотокамера ---
    async function startCamera() {
        switchScreen('screen-camera');
        const video = document.getElementById('video');
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = videoStream;
        } catch (err) {
            alert("Не удалось запустить фотокамеру. Шаг пропущен.");
            openCardForm();
        }
    }

    document.getElementById('btn-capture').addEventListener('click', () => {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        currentPhotoData = canvas.toDataURL('image/jpeg', 0.7); // сжатие фото для экономии памяти
        
        stopCamera();
        openCardForm();
    });

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
        }
    }

    document.getElementById('btn-cancel-cam').addEventListener('click', () => {
        stopCamera();
        switchScreen('screen-main');
    });

    // --- Модуль 3: Карточка параметров ---
    function openCardForm() {
        switchScreen('screen-card');
        document.getElementById('input-sn').value = currentScanResult;
        document.getElementById('input-brand').value = '';
        document.getElementById('input-model').value = '';
        document.getElementById('input-desc').value = '';
        
        const imgPreview = document.getElementById('photo-preview');
        if (currentPhotoData) {
            imgPreview.src = currentPhotoData;
            imgPreview.style.display = 'block';
        } else {
            imgPreview.style.display = 'none';
        }
    }

    document.getElementById('btn-save').addEventListener('click', () => {
        const monitor = {
            id: Date.now(),
            sn: document.getElementById('input-sn').value,
            brand: document.getElementById('input-brand').value || 'Не указан',
            model: document.getElementById('input-model').value || 'Не указана',
            desc: document.getElementById('input-desc').value,
            photo: currentPhotoData
        };

        db.push(monitor);
        localStorage.setItem('monitor_db', JSON.stringify(db));
        switchScreen('screen-main');
    });

    // --- Модуль 4: База Данных ---
    function renderDatabase() {
        const listView = document.getElementById('db-list-view');
        const tableBody = document.querySelector('#monitors-table tbody');
        
        listView.innerHTML = '';
        tableBody.innerHTML = '';

        if (db.length === 0) {
            listView.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">База данных пуста</div>';
            return;
        }

        db.forEach(item => {
            // Заполнение карточек (вид списком)
            const card = document.createElement('div');
            card.className = 'monitor-item';
            card.innerHTML = `
                <h4>${item.brand} ${item.model}</h4>
                <p><b>S/N:</b> ${item.sn}</p>
                ${item.desc ? `<p><span>${item.desc}</span></p>` : ''}
                <button class="btn-delete-item" onclick="deleteItem(${item.id})">❌</button>
            `;
            listView.appendChild(card);

            // Заполнение таблицы (для копирования)
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.brand}</td>
                <td>${item.model}</td>
                <td>${item.sn}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Переключение режимов Таблица/Список в БД
    document.getElementById('btn-toggle-view').addEventListener('click', function() {
        const listView = document.getElementById('db-list-view');
        const tableView = document.getElementById('db-table-view');
        
        if (listView.classList.contains('active-view')) {
            listView.classList.remove('active-view');
            tableView.classList.add('active-view');
            this.textContent = 'Показать как список';
        } else {
            tableView.classList.remove('active-view');
            listView.classList.add('active-view');
            this.textContent = 'Показать как таблицу';
        }
    });

    // Удаление отдельной карточки
    function deleteItem(id) {
        if (confirm('Удалить эту карточку?')) {
            db = db.filter(item => item.id !== id);
            localStorage.setItem('monitor_db', JSON.stringify(db));
            renderDatabase();
        }
    }

    // Очистить всю БД
    document.getElementById('btn-clear-db').addEventListener('click', () => {
        if (confirm('Вы уверены, что хотите полностью очистить базу данных? Это действие нельзя отменить.')) {
            db = [];
            localStorage.setItem('monitor_db', JSON.stringify(db));
            renderDatabase();
        }
    });

</script>
</head>
<body>

    <!-- Главное меню -->
    <div id="screen-main" class="screen active">
        <div class="app-header">Учет Мониторов</div>
        <div class="main-buttons">
            <button id="btn-add" class="btn-primary"><span class="icon">＋</span>Добавить монитор</button>
            <button id="btn-db" class="btn-secondary"><span class="icon">📁</span>База данных</button>
        </div>
    </div>

    <!-- Экран 1: Сканер штрих-кодов -->
    <div id="screen-scanner" class="screen">
        <div class="app-header">Шаг 1: Сканирование серийного номера</div>
        <div class="scanner-container">
            <div id="interactive" class="viewport"></div>
        </div>
        <button id="btn-cancel-scan" class="btn-danger">Отмена</button>
    </div>

    <!-- Экран 2: Фотокамера -->
    <div id="screen-camera" class="screen">
        <div class="app-header">Шаг 2: Фото модели и производителя</div>
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
        <button id="btn-capture" class="btn-primary">Сделать фото</button>
        <button id="btn-cancel-cam" class="btn-danger">Отмена</button>
    </div>

    <!-- Экран 3: Карточка параметров -->
    <div id="screen-card" class="screen">
        <div class="app-header">Параметры монитора</div>
        <div class="card-form">
            <div class="photo-preview-container">
                <img id="photo-preview" src="" alt="Фото монитора">
            </div>
            <div class="form-group">
                <label>Серийный номер:</label>
                <input type="text" id="input-sn">
            </div>
            <div class="form-group">
                <label>Производитель:</label>
                <input type="text" id="input-brand" placeholder="Например: Samsung">
            </div>
            <div class="form-group">
                <label>Модель:</label>
                <input type="text" id="input-model" placeholder="Например: SyncMaster T220">
            </div>
            <div class="form-group">
                <label>Дополнительное описание:</label>
                <textarea id="input-desc" rows="3" placeholder="Диагональ, порты, состояние..."></textarea>
            </div>
            <button id="btn-save" class="btn-primary">Сохранить и выйти</button>
        </div>
    </div>

    <!-- Экран 4: База данных -->
    <div id="screen-database" class="screen">
        <div class="app-header">
            <span>База данных</span>
            <button id="btn-back-main" class="btn-back">Назад</button>
        </div>
        
        <div class="db-actions">
            <button id="btn-toggle-view" class="btn-secondary">Показать как таблицу</button>
            <button id="btn-clear-db" class="btn-danger">Очистить всё</button>
        </div>

        <!-- Вид списком (Карточки) -->
        <div id="db-list-view" class="db-content active-view"></div>

        <!-- Вид таблицей (Для копирования) -->
        <div id="db-table-view" class="db-content">
            <div class="table-instructions">Выделите таблицу мышкой и нажмите Ctrl+C для вставки в Word</div>
            <div class="table-wrapper">
                <table id="monitors-table">
                    <thead>
                        <tr>
                            <th>Производитель</th>
                            <th>Модель</th>
                            <th>Серийный номер</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
